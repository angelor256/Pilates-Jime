        <h1 class="serif-title text-4xl font-light tracking-wide text-stone-800">Pilates con Jime</h1>
        <p class="text-xs uppercase tracking-[0.25em] text-stone-400 mt-2">Mindful Movement & Balance</p>

        <!-- Menú de Pestañas Principales (Excel Tabs) -->

    </header>

    <!-- Contenido Principal -->

            <!-- Search Bar -->

            </div>
            
            <!-- Subcategories Filter Buttons -->

                <!-- Se llenará dinámicamente -->

        <!-- Grid de Tarjetas de Ejercicios -->

            <!-- Las tarjetas se generan dinámicamente -->

    </main>

        // Estado Global de la App
        let currentMainTab = 'mat';
        let currentSubFilter = 'Todos';

        // Cambiar entre Mat y Reformer
        function switchMainTab(tab) {
            currentMainTab = tab;
            currentSubFilter = 'Todos'; // Reiniciar subfiltro
            document.getElementById('search-input').value = ''; // Limpiar buscador
            
            // Actualizar diseño de botones principales
            const matBtn = document.getElementById('tab-mat');
            const refBtn = document.getElementById('tab-reformer');
            
            if(tab === 'mat') {
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            } else {
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            }

            renderSubcategories();
            handleFilter();
        }

        // Renderizar las píldoras de filtro secundario basándose en los datos
        function renderSubcategories() {
            const container = document.getElementById('subcategories-container');
            container.innerHTML = '';

            // Obtener las subcategorías únicas para esta pestaña principal
            const uniqueSubs = ['Todos', ...new Set(db[currentMainTab].map(item => item.sub))];

            uniqueSubs.forEach(sub => {
                const btn = document.createElement('button');
                btn.textContent = sub;
                btn.className = "px-4 py-1.5 rounded-xl text-xs font-medium transition-all duration-200 cursor-pointer ";
                
                if(sub === currentSubFilter) {
                    btn.className += "bg-stone-800 text-white shadow-xs";
                } else {
                    btn.className += "bg-stone-100 text-stone-500 hover:bg-stone-200";
                }

                btn.onclick = () => {
                    currentSubFilter = sub;
                    renderSubcategories();
                    handleFilter();
                };
                container.appendChild(btn);
            });
        }

        // Filtrar y buscar en tiempo real
        function handleFilter() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('exercises-grid');
            grid.innerHTML = '';

            // Filtrar lista completa del tab seleccionado
            let filteredList = db[currentMainTab];

            // 1. Filtrar por subcategoría si no es 'Todos'
            if (currentSubFilter !== 'Todos') {
                filteredList = filteredList.filter(item => item.sub === currentSubFilter);
            }

            // 2. Filtrar por texto de búsqueda
            if (searchText) {
                filteredList = filteredList.filter(item => item.name.toLowerCase().includes(searchText));
            }

            // Validar si está vacío
            if(filteredList.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-stone-400 text-sm py-12 italic">No encontramos ejercicios que coincidan con la búsqueda.</div>`;
                return;
            }

            // Crear tarjetas
            filteredList.forEach(ex => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-stone-200/50 shadow-xs hover:shadow-md transition-all duration-300 flex flex-col justify-between";
                
                // Definir etiqueta dinámica (Repeticiones o Resortes)
                const label = currentMainTab === 'mat' ? 'Repeticiones' : 'Configuración / Resortes';

                card.innerHTML = `
                    <div>
                        <span class="text-[10px] font-semibold tracking-wider text-[#A98467] uppercase bg-[#F5EBE6] px-2 py-0.5 rounded-md">${ex.sub}</span>
                        <h3 class="serif-title text-xl font-normal text-stone-800 mt-3 mb-1">${ex.name}</h3>
                    </div>
                    <div class="mt-6 pt-3 border-t border-stone-100 flex justify-between items-center">
                        <span class="text-xs uppercase tracking-wider text-stone-400 font-medium">${label}</span>
                        <span class="px-3 py-1 bg-stone-100 text-stone-700 text-xs font-semibold rounded-lg">${ex.value}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Inicializar la App en Pilates Mat
        document.addEventListener("DOMContentLoaded", () => {
            switchMainTab('mat');
        });

</html>
