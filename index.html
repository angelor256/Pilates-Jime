<html lang="es">
<head>

    <title>Pilates con Jime - Rutinas & Ejercicios</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts para tipografías delicadas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAF7F2; /* Fondo crema suave aesthetic */
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FAF7F2; }
        ::-webkit-scrollbar-thumb { background: #E6DFD5; border-radius: 10px; }
    </style>
</head>
<body class="text-stone-700 min-h-screen flex flex-col">

    <!-- Encabezado Principal -->
    <header class="w-full py-8 text-center bg-white/70 backdrop-blur-md sticky top-0 z-40 border-b border-stone-200/50">
        <h1 class="serif-title text-4xl font-light tracking-wide text-stone-800">Pilates con Jime</h1>
        <p class="text-xs uppercase tracking-[0.25em] text-[#A98467] mt-2 font-semibold">Mindful Movement & Balance</p>

        <!-- Menú de Pestañas Rediseñado -->
        <div class="flex flex-wrap justify-center gap-3 mt-6 px-4">
            <button id="tab-mat" onclick="switchMainTab('mat')" class="px-5 py-2 rounded-full font-medium text-xs md:text-sm transition-all duration-300 cursor-pointer border shadow-2xs">
                Mat (Todos)
            </button>
            <button id="tab-mat-basico" onclick="switchMainTab('mat-basico')" class="px-5 py-2 rounded-full font-medium text-xs md:text-sm transition-all duration-300 cursor-pointer border shadow-2xs">
                Mat Básico
            </button>
            <button id="tab-mat-intermedio" onclick="switchMainTab('mat-intermedio')" class="px-5 py-2 rounded-full font-medium text-xs md:text-sm transition-all duration-300 cursor-pointer border shadow-2xs">
                Mat Intermedio
            </button>
            <button id="tab-reformer" onclick="switchMainTab('reformer')" class="px-5 py-2 rounded-full font-medium text-xs md:text-sm transition-all duration-300 cursor-pointer border shadow-2xs">
                Reformer
            </button>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-4xl w-full mx-auto px-6 py-10 flex-grow">
        
        <!-- Buscador -->
        <div class="bg-white p-5 rounded-2xl border border-stone-200/60 shadow-xs mb-8">
            <input type="text" id="search-input" oninput="handleFilter()" placeholder="Buscar un ejercicio específico por su nombre..." 
                class="w-full pl-4 pr-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-stone-400 transition-colors">
        </div>

        <!-- Título de Sección Actual -->
        <div class="mb-6">
            <h2 id="section-title" class="serif-title text-2xl font-medium text-stone-800"></h2>
            <div class="h-[2px] w-16 bg-[#A98467] mt-2 rounded-full"></div>
        </div>

        <!-- Contenedor Mixto Dinámico -->
        <div id="exercises-container" class="space-y-4">
            <!-- Aquí se inyectan las tarjetas y los acordeones automáticamente -->
        </div>
    </main>

    <!-- Ventana Emergente / Modal de Detalle (Aesthetic y Minimalista) -->
    <div id="exercise-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300" onclick="closeModalOnOutsideClick(event)">
        <div class="bg-white rounded-3xl max-w-md w-11/12 overflow-hidden shadow-2xl relative border border-stone-200 transform scale-95 transition-transform duration-300">
            <!-- Botón de Cerrar Superior -->
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/80 hover:bg-white text-stone-700 hover:text-stone-900 w-8 h-8 rounded-full flex items-center justify-center shadow-sm border border-stone-100 z-10 transition-colors cursor-pointer">
                ✕
            </button>

            <!-- Imagen de Portada del Detalle -->
            <div class="relative w-full h-64 bg-stone-100 flex items-center justify-center overflow-hidden border-b border-stone-100 group">
                <img id="modal-img" src="" alt="" class="w-full h-full object-cover hidden">
                
                <div id="modal-placeholder" class="text-stone-400 italic text-sm flex flex-col items-center gap-2">
                    <svg class="w-12 h-12 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span>Sin foto de ejercicio</span>
                </div>

                <!-- Capa interactiva para subir foto directamente en el detalle -->
                <label class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center cursor-pointer text-white text-sm font-medium gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    <span>Actualizar Foto</span>
                    <input type="file" id="modal-file-input" accept="image/*" class="hidden">
                </label>
            </div>

            <!-- Información del Ejercicio -->
            <div class="p-6 space-y-4">
                <div>
                    <span id="modal-badge-category" class="text-[9px] font-bold tracking-widest text-[#A98467] uppercase bg-[#FAF7F2] border border-[#E6DFD5] px-2.5 py-1 rounded-md">Categoría</span>
                    <h3 id="modal-title" class="serif-title text-2xl font-semibold text-stone-800 mt-2.5 leading-tight">Nombre del Ejercicio</h3>
                </div>

                <div class="h-[1px] bg-stone-100"></div>

                <!-- Detalle de Valor (Repeticiones o Resortes) -->
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-xl border border-stone-200/50">
                    <span id="modal-label-value" class="text-xs uppercase tracking-wider text-stone-500 font-medium">Repeticiones / Resortes</span>
                    <span id="modal-value" class="px-3.5 py-1 bg-white text-[#A98467] text-sm font-semibold rounded-lg border border-stone-200 shadow-3xs"></span>
                </div>

                <!-- Sub-ejercicios o variantes -->
                <div id="modal-subitems-container" class="hidden">
                    <span class="text-xs uppercase tracking-wider text-stone-500 font-medium block mb-2">Variaciones de la serie:</span>
                    <div id="modal-subitems-list" class="flex flex-wrap gap-1.5"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->

        <p>&copy; Pilates con Jime. Hecho con ♡ para Umera.</p>
    </footer>

                { id: "r22", isGroup: false, name: "Pelvic Lift", value: "N/A", img: "" },
                { id: "r23", isGroup: false, name: "Push up Front", value: "2, gear out", img: "" },
                { id: "r24", isGroup: false, name: "Push up Back", value: "2, reg gear", img: "" },
                { id: "r25", isGroup: false, name: "Side Splits", value: "2 or 1", img: "" },
                { id: "r26", isGroup: false, name: "Front Splits", value: "2", img: "" },
                { id: "r27", isGroup: false, name: "Russian Splits", value: "N/A", img: "" }
            ]
        };

        let currentMainTab = 'mat';

        const tabTitles = {
            'mat': 'Ejercicios de Pilates Mat (Todos)',
            'mat-basico': 'Rutina Mat Clásico Básico (Principiantes)',
            'mat-intermedio': 'Rutina Mat Clásico Intermedio',
            'reformer': 'Ejercicios & Series de Reformer'
        };

        // Guardar imágenes dinámicamente
        function saveImage(id, base64Image) {
            localStorage.setItem(`img_${id}`, base64Image);
            
            // Actualizar la lista de fondo de inmediato
            const listImg = document.getElementById(`img-preview-${id}`);
            const listPlaceholder = document.getElementById(`img-placeholder-${id}`);
            
            if (listImg) {
                listImg.src = base64Image;
                listImg.classList.remove('hidden');
            }
            if (listPlaceholder) {
                listPlaceholder.classList.add('hidden');
            }
        }

        // Subida de foto en general (lista)
        function handleImageUpload(event, id) {
            event.stopPropagation(); // Evitar que se abra el modal al presionar subir foto
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                saveImage(id, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // Configuración de los Modales
        let activeExerciseId = null;

        function openModal(id, categoryName) {
            // Encontrar el ejercicio en la db
            let itemFound = null;
            for (let tab in db) {
                const search = db[tab].find(el => {
                    if (!el.isGroup && el.id === id) return true;
                    if (el.isGroup) {
                        const sub = el.exercises.find(subEx => subEx.id === id);
                        if (sub) {
                            itemFound = sub;
                            return true;
                        }
                    }
                    return false;
                });
                if (search && !itemFound) itemFound = search;
            }

            if (!itemFound) return;
            activeExerciseId = id;

            // Llenar datos en el modal
            document.getElementById('modal-title').textContent = itemFound.name;
            document.getElementById('modal-badge-category').textContent = tabTitles[categoryName] || 'Pilates';
            
            const badgeLabel = categoryName === 'reformer' ? 'Resortes' : 'Repeticiones';
            document.getElementById('modal-label-value').textContent = badgeLabel;
            document.getElementById('modal-value').textContent = itemFound.value || 'N/A';

            // Cargar imagen
            const modalImg = document.getElementById('modal-img');
            const modalPlaceholder = document.getElementById('modal-placeholder');
            const currentImg = getExerciseImage(itemFound);

            if (currentImg) {
                modalImg.src = currentImg;
                modalImg.classList.remove('hidden');
                modalPlaceholder.classList.add('hidden');
            } else {
                modalImg.classList.add('hidden');
                modalPlaceholder.classList.remove('hidden');
            }

            // Sub-items (variantes)
            const subItemsContainer = document.getElementById('modal-subitems-container');
            const subItemsList = document.getElementById('modal-subitems-list');
            subItemsList.innerHTML = '';
            
            if (itemFound.subItems && itemFound.subItems.length > 0) {
                subItemsContainer.classList.remove('hidden');
                itemFound.subItems.forEach(sub => {
                    subItemsList.innerHTML += `<span class="text-xs bg-stone-100 text-stone-600 px-3 py-1 rounded-lg border border-stone-200">${sub}</span>`;
                });
            } else {
                subItemsContainer.classList.add('hidden');
            }

            // Preparar el lector de archivos para el botón del modal
            const modalFileInput = document.getElementById('modal-file-input');
            modalFileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Image = event.target.result;
                    // Guardar y actualizar de inmediato en modal y lista
                    saveImage(activeExerciseId, base64Image);
                    modalImg.src = base64Image;
                    modalImg.classList.remove('hidden');
                    modalPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            };

            // Mostrar el modal con transición suave
            const modal = document.getElementById('exercise-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.querySelector('div').classList.remove('scale-95');
                modal.querySelector('div').classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('exercise-modal');
            modal.classList.remove('opacity-100');
            modal.querySelector('div').classList.remove('scale-100');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function closeModalOnOutsideClick(event) {
            if (event.target === document.getElementById('exercise-modal')) {
                closeModal();
            }
        }

        // Cerrar modal con la tecla Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.getElementById('search-input').value = ''; // Limpiar buscador
            
            // Actualizar título de sección en pantalla
            document.getElementById('section-title').textContent = tabTitles[tab];

            const tabs = ['mat', 'mat-basico', 'mat-intermedio', 'reformer'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if(t === tab) {
                    btn.className = "px-5 py-2 rounded-full font-medium text-xs md:text-sm transition-all duration-300 cursor-pointer bg-[#A98467] text-white border-[#A98467] shadow-md";
                } else {
                    btn.className = "px-5 py-2 rounded-full font-medium text-xs md:text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-[#A98467]";
                }
            });

            handleFilter();
        }

        function toggleDropdown(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // Obtener ruta de imagen (Dando prioridad al LocalStorage de Jime, luego al código fuente)
        function getExerciseImage(ex) {
            const savedImg = localStorage.getItem(`img_${ex.id}`);
            return savedImg || ex.img || "";
        }

        // Diseño para ejercicio suelto con opción de subir foto incorporada
        function renderExerciseRow(ex, badgeLabel) {
            const currentImg = getExerciseImage(ex);
            return `
                <div onclick="openModal('${ex.id}', '${currentMainTab}')" 
                     class="bg-white border border-stone-200/60 p-4 rounded-xl shadow-3xs flex flex-col md:flex-row justify-between gap-4 items-start md:items-center hover:border-stone-400 hover:shadow-xs transition-all duration-300 cursor-pointer">
                    <div class="flex gap-4 items-center w-full md:w-auto">
                        <!-- Contenedor de Imagen y Subidor -->
                        <div class="relative w-16 h-16 group flex-shrink-0">
                            <img id="img-preview-${ex.id}" src="${currentImg}" alt="${ex.name}" 
                                 class="w-16 h-16 object-cover rounded-lg border border-stone-200 shadow-3xs ${currentImg ? '' : 'hidden'}">
                            
                            <div id="img-placeholder-${ex.id}" 
                                 class="w-16 h-16 bg-stone-100 rounded-lg border border-stone-200/40 flex items-center justify-center text-stone-300 text-[10px] text-center p-1 italic select-none ${currentImg ? 'hidden' : ''}">
                                <span>Sin foto</span>
                            </div>

                            <!-- Botón Superpuesto para Subir Imagen (Evita propagación) -->
                            <label onclick="event.stopPropagation();" class="absolute inset-0 bg-black/40 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer text-[9px] text-white font-medium text-center p-1 select-none">
                                Subir Foto
                                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, '${ex.id}')">
                            </label>
                        </div>

                        <div>
                            <h4 class="text-stone-800 text-base font-semibold tracking-wide">${ex.name}</h4>
                            ${ex.subItems ? `
                                <div class="mt-1.5 flex flex-wrap gap-1">
                                    ${ex.subItems.map(sub => `<span class="text-[10px] bg-stone-50 text-stone-500 px-2 py-0.5 rounded-md border border-stone-200/40">${sub}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-1.5 self-end md:self-center flex-shrink-0">
                        <span class="text-[10px] uppercase tracking-wider text-stone-400 font-medium">${badgeLabel}:</span>
                        <span class="px-2.5 py-1 bg-[#FAF7F2] text-[#A98467] text-xs font-semibold rounded-md border border-[#E6DFD5]">${ex.value || 'N/A'}</span>
                    </div>
                </div>
            `;
        }

        // Diseño de grupo para el acordeón (Con fondo de contraste para dividir del resto)
        function renderGroupAccordion(item, index, badgeLabel, searchText) {
            let exercisesToRender = item.exercises;

            if (searchText) {
                exercisesToRender = item.exercises.filter(ex => 
                    ex.name.toLowerCase().includes(searchText)
                );
                if (!item.title.toLowerCase().includes(searchText) && exercisesToRender.length === 0) {
                    return ''; // Ocultar si no hay coincidencias
                }
                if (exercisesToRender.length === 0) exercisesToRender = item.exercises;
            }

            return `
                <div class="bg-[#F5F2EC] border border-[#DDD0C2] rounded-xl shadow-xs overflow-hidden transition-all duration-300">
                    <!-- Botón del Bloque Desplegable -->
                    <div onclick="toggleDropdown('${index}')" class="p-5 flex justify-between items-center cursor-pointer bg-[#F5F2EC] hover:bg-[#EDE8DE] transition-colors">
                        <div>
                            <span class="text-[9px] font-bold tracking-wider text-white bg-[#A98467] px-2 py-0.5 rounded-md uppercase">Serie / Grupo</span>
                            <h3 class="serif-title text-lg font-semibold text-stone-800 mt-1.5 pr-4">${item.title}</h3>
                        </div>
                        <svg id="icon-${index}" class="w-5 h-5 text-[#A98467] transition-transform duration-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>

                    <!-- Contenedor Interno Desplegable -->
                    <div id="content-${index}" class="${searchText ? '' : 'hidden'} border-t border-[#DDD0C2] bg-white p-4 space-y-2">
                        ${exercisesToRender.map(ex => renderExerciseRow(ex, badgeLabel)).join('')}
                    </div>
                </div>
            `;
        }

        function handleFilter() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            const badgeLabel = currentMainTab === 'reformer' ? 'Resortes' : 'Reps';
            let list = db[currentMainTab];

            list.forEach((item, index) => {
                if (!item.isGroup) {
                    if (searchText && !item.name.toLowerCase().includes(searchText) && !(item.subItems && item.subItems.some(s => s.toLowerCase().includes(searchText)))) {
                        return; // Saltar si no coincide
                    }
                    container.innerHTML += renderExerciseRow(item, badgeLabel);
                } else {
                    const accordionHTML = renderGroupAccordion(item, index, badgeLabel, searchText);
                    if (accordionHTML) {
                        container.innerHTML += accordionHTML;
                    }
                }
            });

            if (container.children.length === 0) {
                container.innerHTML = `<p class="text-center text-stone-400 text-sm py-12 italic">No encontramos coincidencias.</p>`;
            }
        }

        // Inicializar por defecto en Mat (Todos)
        document.addEventListener("DOMContentLoaded", () => {
            switchMainTab('mat');
        });
    </script>
</body>
</html>
