    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600&family=Playfair+Display:ital,wght=0,400;0,500;1,400&display=swap" rel="stylesheet">  
      
    <style>  
        body {  
            font-family: 'Plus Jakarta Sans', sans-serif;  
            background-color: #FAF7F2; /* Fondo crema suave aesthetic */  
        }  
        .serif-title {  
            font-family: 'Playfair Display', serif;  
        }  
        ::-webkit-scrollbar { width: 6px; }  
        ::-webkit-scrollbar-track { background: #FAF7F2; }  
        ::-webkit-scrollbar-thumb { background: #E6DFD5; border-radius: 10px; }

        /* ---------- Intro / primera carga ---------- */
        #intro-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: #FAF7F2;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .7s ease, visibility .7s ease;
        }
        #intro-overlay.intro-hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .breathe-ring {
            position: absolute; border-radius: 50%; border: 1px solid #A98467;
            opacity: 0; animation: breathe 2.6s ease-out infinite;
        }
        .breathe-ring:nth-child(2) { animation-delay: .65s; }
        .breathe-ring:nth-child(3) { animation-delay: 1.3s; }
        @keyframes breathe {
            0%   { width: 20px; height: 20px; opacity: .9; }
            80%  { opacity: 0; }
            100% { width: 220px; height: 220px; opacity: 0; }
        }
        .intro-word {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: #8a6f57;
            letter-spacing: .05em;
            opacity: 0;
            animation: introWordIn 1.1s ease forwards .35s;
        }
        @keyframes introWordIn {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Entrada escalonada del contenido ---------- */
        .reveal {
            opacity: 0;
            transform: translateY(14px);
            animation: revealUp .6s cubic-bezier(.22,1,.36,1) forwards;
        }
        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- Entrada escalonada de tarjetas / acordeones ---------- */
        .card-enter {
            opacity: 0;
            transform: translateY(10px) scale(.98);
            animation: cardIn .45s cubic-bezier(.22,1,.36,1) forwards;
        }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ---------- Micro-interacciones ---------- */
        .btn-press { transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease, background-color .3s ease, color .3s ease, border-color .3s ease; }
        .btn-press:active { transform: scale(.94); }
        .btn-press:hover { transform: translateY(-1px); }

        .exercise-card { transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s ease, border-color .3s ease; }
        .exercise-card:hover { transform: translateY(-2px); }
        .exercise-card:active { transform: translateY(0) scale(.99); }

        /* Acordeón con transición de altura suave */
        .accordion-panel {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows .45s cubic-bezier(.22,1,.36,1);
        }
        .accordion-panel.open { grid-template-rows: 1fr; }
        .accordion-panel > div { overflow: hidden; }
        .accordion-caret { transition: transform .4s cubic-bezier(.22,1,.36,1); }

        /* Modal con efecto resorte */
        #exercise-modal.modal-visible { opacity: 1; }
        #exercise-modal .modal-panel {
            transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
        }
        #exercise-modal.modal-visible .modal-panel {
            transform: scale(1);
            opacity: 1;
        }

        /* Resaltado del título de sección al cambiar */
        #section-title.title-swap { animation: titleSwap .5s cubic-bezier(.22,1,.36,1); }
        @keyframes titleSwap {
            0% { opacity: 0; transform: translateX(-6px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        }
    </style>

                Mat (Todos)

            <button type="button" id="tab-mat-basico" data-tab="mat-basico" class="btn-press px-5 py-2 rounded-full font-medium text-xs md:text-sm cursor-pointer border shadow-2xs">

                Mat Intermedio

                Reformer  
            </button>  
        </div>  
    </header>

    <!-- Ventana Emergente / Modal de Detalle (Aesthetic y Minimalista) -->  
    <div id="exercise-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-xs flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300" onclick="closeModalOnOutsideClick(event)">

                    <span>Sin foto de ejercicio</span>  
                </div>

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">  
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>

                </label>  
            </div>  
            <!-- Información del Ejercicio -->

                </div>

        </div>  
    </div>

                },  
                { id: "r11", isGroup: false, name: "Short Spine Massage", value: "N/A", img: "" },  
                { id: "r12", isGroup: false, name: "Semi Circle", value: "N/A", img: "" },  
                { id: "r13", isGroup: false, name: "Chest Expansion", value: "N/A", img: "" },  
                { id: "r14", isGroup: false, name: "Thigh Stretch", value: "3", img: "" },  
                { id: "r15", isGroup: false, name: "Arm Circles", value: "1", img: "" },  
                { id: "r16", isGroup: false, name: "Snake & Twist", value: "N/A", img: "" },  
                { id: "r17", isGroup: false, name: "Corkscrew, Tick Tock", value: "2", img: "" },  
                { id: "r18", isGroup: false, name: "Step Off Control Balance", value: "N/A", img: "" },  
                {   
                    isGroup: true,   
                    title: "Feet in Straps",   
                    exercises: [  
                        { id: "r19_1", name: "Long Spine Massage", value: "2", img: "" },  
                        { id: "r19_2", name: "Leg Circles", value: "N/A", img: "" },  
                        { id: "r19_3", name: "Frogs", value: "N/A", img: "" }  
                    ]  
                },  
                {   
                    isGroup: true,   
                    title: "Knee Stretch Series",   
                    exercises: [  
                        { id: "r20_1", name: "Round", value: "2", img: "" },  
                        { id: "r20_2", name: "Arched", value: "N/A", img: "" },  
                        { id: "r20_3", name: "Knees Off", value: "N/A", img: "" }  
                    ]  
                },  
                { id: "r21", isGroup: false, name: "Running", value: "4", img: "" },  
                { id: "r22", isGroup: false, name: "Pelvic Lift", value: "N/A", img: "" },  
                { id: "r23", isGroup: false, name: "Push up Front", value: "2, gear out", img: "" },  
                { id: "r24", isGroup: false, name: "Push up Back", value: "2, reg gear", img: "" },  
                { id: "r25", isGroup: false, name: "Side Splits", value: "2 or 1", img: "" },  
                { id: "r26", isGroup: false, name: "Front Splits", value: "2", img: "" },  
                { id: "r27", isGroup: false, name: "Russian Splits", value: "N/A", img: "" }  
            ]  
        };  
        let currentMainTab = 'mat';  
        const tabTitles = {  
            'mat': 'Ejercicios de Pilates Mat (Todos)',  
            'mat-basico': 'Rutina Mat Clásico Básico (Principiantes)',  
            'mat-intermedio': 'Rutina Mat Clásico Intermedio',  
            'reformer': 'Ejercicios & Series de Reformer'  
        };  
        // Guardar imágenes dinámicamente  
        function saveImage(id, base64Image) {  
            localStorage.setItem(`img_${id}`, base64Image);  
              
            // Actualizar la lista de fondo de inmediato  
            const listImg = document.getElementById(`img-preview-${id}`);  
            const listPlaceholder = document.getElementById(`img-placeholder-${id}`);  
              
            if (listImg) {  
                listImg.src = base64Image;  
                listImg.classList.remove('hidden');  
            }  
            if (listPlaceholder) {  
                listPlaceholder.classList.add('hidden');  
            }  
        }  
        // Subida de foto en general (lista)  
        function handleImageUpload(event, id) {  
            event.stopPropagation(); // Evitar que se abra el modal al presionar subir foto  
            const file = event.target.files[0];  
            if (!file) return;  
            const reader = new FileReader();  
            reader.onload = function(e) {  
                saveImage(id, e.target.result);  
            };  
            reader.readAsDataURL(file);  
        }  
        // Configuración de los Modales  
        let activeExerciseId = null;  
        function openModal(id, categoryName) {  
            // Encontrar el ejercicio en la db  
            let itemFound = null;  
            for (let tab in db) {  
                const search = db[tab].find(el => {  
                    if (!el.isGroup && el.id === id) return true;  
                    if (el.isGroup) {  
                        const sub = el.exercises.find(subEx => subEx.id === id);  
                        if (sub) {  
                            itemFound = sub;  
                            return true;  
                        }  
                    }  
                    return false;  
                });  
                if (search && !itemFound) itemFound = search;  
            }  
            if (!itemFound) return;  
            activeExerciseId = id;  
            // Llenar datos en el modal  
            document.getElementById('modal-title').textContent = itemFound.name;  
            document.getElementById('modal-badge-category').textContent = tabTitles[categoryName] || 'Pilates';  
              
            const badgeLabel = categoryName === 'reformer' ? 'Resortes' : 'Repeticiones';  
            document.getElementById('modal-label-value').textContent = badgeLabel;  
            document.getElementById('modal-value').textContent = itemFound.value || 'N/A';  
            // Cargar imagen  
            const modalImg = document.getElementById('modal-img');  
            const modalPlaceholder = document.getElementById('modal-placeholder');  
            const currentImg = getExerciseImage(itemFound);  
            if (currentImg) {  
                modalImg.src = currentImg.startsWith('data:') ? currentImg : encodeURI(currentImg);  
                modalImg.classList.remove('hidden');  
                modalPlaceholder.classList.add('hidden');  
            } else {  
                modalImg.classList.add('hidden');  
                modalPlaceholder.classList.remove('hidden');  
            }  
            // Sub-items (variantes)  
            const subItemsContainer = document.getElementById('modal-subitems-container');  
            const subItemsList = document.getElementById('modal-subitems-list');  
            subItemsList.innerHTML = '';  
              
            if (itemFound.subItems && itemFound.subItems.length > 0) {  
                subItemsContainer.classList.remove('hidden');  
                itemFound.subItems.forEach(sub => {  
                    subItemsList.innerHTML += `<span class="text-xs bg-stone-100 text-stone-600 px-3 py-1 rounded-lg border border-stone-200">${sub}</span>`;  
                });  
            } else {  
                subItemsContainer.classList.add('hidden');  
            }  
            // Preparar el lector de archivos para el botón del modal  
            const modalFileInput = document.getElementById('modal-file-input');  
            modalFileInput.onchange = function(e) {  
                const file = e.target.files[0];  
                if (!file) return;  
                const reader = new FileReader();  
                reader.onload = function(event) {  
                    const base64Image = event.target.result;  
                    // Guardar y actualizar de inmediato en modal y lista  
                    saveImage(activeExerciseId, base64Image);  
                    modalImg.src = base64Image;  
                    modalImg.classList.remove('hidden');  
                    modalPlaceholder.classList.add('hidden');  
                };  
                reader.readAsDataURL(file);  
            };  
            // Mostrar el modal con transición de resorte  
            const modal = document.getElementById('exercise-modal');  
            const panel = modal.querySelector('.modal-panel');  
            modal.classList.remove('hidden');  
            requestAnimationFrame(() => {  
                modal.classList.add('opacity-100', 'modal-visible');  
                panel.classList.remove('scale-90', 'opacity-0');  
            });  
        }  
        function closeModal() {  
            const modal = document.getElementById('exercise-modal');  
            const panel = modal.querySelector('.modal-panel');  
            modal.classList.remove('opacity-100', 'modal-visible');  
            panel.classList.add('scale-90', 'opacity-0');  
            setTimeout(() => {  
                modal.classList.add('hidden');  
            }, 300);  
        }  
        function closeModalOnOutsideClick(event) {  
            if (event.target === document.getElementById('exercise-modal')) {  
                closeModal();  
            }  
        }  
        // Cerrar modal con la tecla Esc  
        document.addEventListener('keydown', (e) => {  
            if (e.key === 'Escape') closeModal();  
        });  
        function switchMainTab(tab) {  
            currentMainTab = tab;  
            document.getElementById('search-input').value = ''; // Limpiar buscador  
              
            // Actualizar título de sección en pantalla, con una pequeña animación  
            const titleEl = document.getElementById('section-title');  
            titleEl.textContent = tabTitles[tab];  
            titleEl.classList.remove('title-swap');  
            void titleEl.offsetWidth; // reiniciar animación  
            titleEl.classList.add('title-swap');  
              
            const tabs = ['mat', 'mat-basico', 'mat-intermedio', 'reformer'];  
            tabs.forEach(t => {  
                const btn = document.getElementById(`tab-${t}`);  
                if(t === tab) {  
                    btn.className = "btn-press px-5 py-2 rounded-full font-medium text-xs md:text-sm cursor-pointer bg-[#A98467] text-white border-[#A98467] shadow-md";  
                } else {  
                    btn.className = "btn-press px-5 py-2 rounded-full font-medium text-xs md:text-sm cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-[#A98467]";  
                }  
            });  
            handleFilter();  
        }  
        // Delegación de eventos para las pestañas: más robusta que onclick inline  
        document.getElementById('tabs-container').addEventListener('click', (e) => {  
            const btn = e.target.closest('[data-tab]');  
            if (!btn) return;  
            switchMainTab(btn.dataset.tab);  
        });  
        function toggleDropdown(index) {  
            const content = document.getElementById(`content-${index}`);  
            const icon = document.getElementById(`icon-${index}`);  
            content.classList.toggle('open');  
            icon.classList.toggle('rotate-180');  
        }  
        // Obtener ruta de imagen (Dando prioridad al LocalStorage de Jime, luego al código fuente)  
        function getExerciseImage(ex) {  
            const savedImg = localStorage.getItem(`img_${ex.id}`);  
            return savedImg || ex.img || "";  
        }  
        // Escapar texto para insertarlo de forma segura en atributos/HTML  
        function escapeHtml(str) {  
            return String(str ?? '').replace(/[&<>"']/g, (c) => ({  
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'  
            }[c]));  
        }  
        // Contador global para escalonar la animación de entrada de las tarjetas  
        let cardStaggerCount = 0;  
        function nextStaggerDelay() {  
            const delay = Math.min(cardStaggerCount * 35, 420);  
            cardStaggerCount++;  
            return delay;  
        }  
        // Diseño para ejercicio suelto con opción de subir foto incorporada  
        function renderExerciseRow(ex, badgeLabel) {  
            const currentImg = getExerciseImage(ex);  
            const safeImg = !currentImg ? '' : (currentImg.startsWith('data:') ? currentImg : encodeURI(currentImg));  
            const safeName = escapeHtml(ex.name);  
            return `  
                <div data-open-modal="${ex.id}" tabindex="0"  
                     class="exercise-card card-enter bg-white border border-stone-200/60 p-4 rounded-xl shadow-3xs flex flex-col md:flex-row justify-between gap-4 items-start md:items-center hover:border-stone-400 hover:shadow-xs cursor-pointer" style="animation-delay:${nextStaggerDelay()}ms">  
                    <div class="flex gap-4 items-center w-full md:w-auto">  
                        <!-- Contenedor de Imagen y Subidor -->  
                        <div class="relative w-16 h-16 group flex-shrink-0">  
                            <img id="img-preview-${ex.id}" src="${safeImg}" alt="${safeName}"   
                                 class="w-16 h-16 object-cover rounded-lg border border-stone-200 shadow-3xs transition-transform duration-300 group-hover:scale-105 ${currentImg ? '' : 'hidden'}">  
                              
                            <div id="img-placeholder-${ex.id}"   
                                 class="w-16 h-16 bg-stone-100 rounded-lg border border-stone-200/40 flex items-center justify-center text-stone-300 text-[10px] text-center p-1 italic select-none ${currentImg ? 'hidden' : ''}">  
                                <span>Sin foto</span>  
                            </div>  
                            <!-- Botón Superpuesto para Subir Imagen (Evita propagación) -->  
                            <label onclick="event.stopPropagation();" class="absolute inset-0 bg-black/40 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer text-[9px] text-white font-medium text-center p-1 select-none">  
                                Subir Foto  
                                <input type="file" accept="image/*" class="hidden" data-upload-id="${ex.id}">  
                            </label>  
                        </div>  
                        <div>  
                            <h4 class="text-stone-800 text-base font-semibold tracking-wide">${safeName}</h4>  
                            ${ex.subItems ? `  
                                <div class="mt-1.5 flex flex-wrap gap-1">  
                                    ${ex.subItems.map(sub => `<span class="text-[10px] bg-stone-50 text-stone-500 px-2 py-0.5 rounded-md border border-stone-200/40">${escapeHtml(sub)}</span>`).join('')}  
                                </div>  
                            ` : ''}  
                        </div>  
                    </div>  
                      
                    <div class="flex items-center gap-1.5 self-end md:self-center flex-shrink-0">  
                        <span class="text-[10px] uppercase tracking-wider text-stone-400 font-medium">${badgeLabel}:</span>  
                        <span class="px-2.5 py-1 bg-[#FAF7F2] text-[#A98467] text-xs font-semibold rounded-md border border-[#E6DFD5]">${escapeHtml(ex.value || 'N/A')}</span>  
                    </div>  
                </div>  
            `;  
        }  
        // Diseño de grupo para el acordeón (Con fondo de contraste para dividir del resto)  
        function renderGroupAccordion(item, index, badgeLabel, searchText) {  
            let exercisesToRender = item.exercises;  
            if (searchText) {  
                exercisesToRender = item.exercises.filter(ex =>   
                    ex.name.toLowerCase().includes(searchText)  
                );  
                if (!item.title.toLowerCase().includes(searchText) && exercisesToRender.length === 0) {  
                    return ''; // Ocultar si no hay coincidencias  
                }  
                if (exercisesToRender.length === 0) exercisesToRender = item.exercises;  
            }  
            const isOpen = !!searchText;  
            return `  
                <div class="bg-[#F5F2EC] border border-[#DDD0C2] rounded-xl shadow-xs overflow-hidden card-enter" style="animation-delay:${nextStaggerDelay()}ms">  
                    <!-- Botón del Bloque Desplegable -->  
                    <div data-toggle-index="${index}" class="p-5 flex justify-between items-center cursor-pointer bg-[#F5F2EC] hover:bg-[#EDE8DE] transition-colors">  
                        <div>  
                            <span class="text-[9px] font-bold tracking-wider text-white bg-[#A98467] px-2 py-0.5 rounded-md uppercase">Serie / Grupo</span>  
                            <h3 class="serif-title text-lg font-semibold text-stone-800 mt-1.5 pr-4">${escapeHtml(item.title)}</h3>  
                        </div>  
                        <svg id="icon-${index}" class="accordion-caret w-5 h-5 text-[#A98467] flex-shrink-0 ${isOpen ? 'rotate-180' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">  
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>  
                        </svg>  
                    </div>  
                    <!-- Contenedor Interno Desplegable (animación de altura suave) -->  
                    <div id="content-${index}" class="accordion-panel ${isOpen ? 'open' : ''}">  
                        <div class="border-t border-[#DDD0C2] bg-white p-4 space-y-2">  
                            ${exercisesToRender.map(ex => renderExerciseRow(ex, badgeLabel)).join('')}  
                        </div>  
                    </div>  
                </div>  
            `;  
        }  
        function handleFilter() {  
            const searchText = document.getElementById('search-input').value.toLowerCase();  
            const container = document.getElementById('exercises-container');  
            container.innerHTML = '';  
            cardStaggerCount = 0; // reiniciar el escalonado de la animación de entrada  
            const badgeLabel = currentMainTab === 'reformer' ? 'Resortes' : 'Reps';  
            let list = db[currentMainTab];  
            list.forEach((item, index) => {  
                if (!item.isGroup) {  
                    if (searchText && !item.name.toLowerCase().includes(searchText) && !(item.subItems && item.subItems.some(s => s.toLowerCase().includes(searchText)))) {  
                        return; // Saltar si no coincide  
                    }  
                    container.innerHTML += renderExerciseRow(item, badgeLabel);  
                } else {  
                    const accordionHTML = renderGroupAccordion(item, index, badgeLabel, searchText);  
                    if (accordionHTML) {  
                        container.innerHTML += accordionHTML;  
                    }  
                }  
            });  
            if (container.children.length === 0) {  
                container.innerHTML = `<p class="text-center text-stone-400 text-sm py-12 italic">No encontramos coincidencias.</p>`;  
            }  
        }  
        // Delegación de eventos del listado de ejercicios: abrir modal, desplegar acordeón, subir foto  
        const exercisesContainer = document.getElementById('exercises-container');  
        exercisesContainer.addEventListener('click', (e) => {  
            const toggle = e.target.closest('[data-toggle-index]');  
            if (toggle) {  
                toggleDropdown(toggle.dataset.toggleIndex);  
                return;  
            }  
            const card = e.target.closest('[data-open-modal]');  
            if (card) {  
                openModal(card.dataset.openModal, currentMainTab);  
            }  
        });  
        exercisesContainer.addEventListener('keydown', (e) => {  
            if (e.key !== 'Enter' && e.key !== ' ') return;  
            const card = e.target.closest('[data-open-modal]');  
            if (card) {  
                e.preventDefault();  
                openModal(card.dataset.openModal, currentMainTab);  
            }  
        });  
        exercisesContainer.addEventListener('change', (e) => {  
            const input = e.target.closest('[data-upload-id]');  
            if (input) {  
                handleImageUpload(e, input.dataset.uploadId);  
            }  
        });  
        // Inicializar por defecto en Mat (Todos)  
        document.addEventListener("DOMContentLoaded", () => {  
            switchMainTab('mat');  
            // Ocultar la pantalla de bienvenida una vez terminada la animación de respiración  
            const intro = document.getElementById('intro-overlay');  
            setTimeout(() => {  
                intro.classList.add('intro-hide');  
                setTimeout(() => intro.remove(), 800);  
            }, 1500);  
        });  
    </script>  
</body>
