        let currentMainTab = 'mat';

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.getElementById('search-input').value = ''; // Limpiar buscador
            
            const matBtn = document.getElementById('tab-mat');
            const refBtn = document.getElementById('tab-reformer');
            
            if(tab === 'mat') {
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            } else {
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            }

            handleFilter();
        }

        function toggleDropdown(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function handleFilter() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            let list = db[currentMainTab];

            // Buscar en títulos o sub-ejercicios
            if (searchText) {
                list = list.map(block => {
                    const matchedExercises = block.exercises.filter(e => 
                        e.name.toLowerCase().includes(searchText) || 
                        (e.subItems && e.subItems.some(sub => sub.toLowerCase().includes(searchText)))
                    );
                    if (block.title.toLowerCase().includes(searchText) || matchedExercises.length > 0) {
                        return { ...block, exercises: matchedExercises.length > 0 ? matchedExercises : block.exercises };
                    }
                    return null;
                }).filter(Boolean);
            }

            if(list.length === 0) {
                container.innerHTML = `<p class="text-center text-stone-400 text-sm py-12 italic">No se encontraron resultados.</p>`;
                return;
            }

            // Renderizar cada bloque/sección en mayúscula de Excel como un acordeón principal
            list.forEach((block, index) => {
                const card = document.createElement('div');
                card.className = "bg-white border border-stone-200/70 rounded-xl shadow-xs overflow-hidden transition-all duration-300";
                
                const rightSideHeader = currentMainTab === 'mat' ? 'Reps' : 'Resortes';

                card.innerHTML = `
                    <!-- Encabezado del Acordeón (Títulos en Mayúscula) -->
                    <div onclick="toggleDropdown('${index}')" class="p-5 flex justify-between items-center cursor-pointer hover:bg-stone-50/60 transition-colors">
                        <div>
                            <span class="text-[10px] font-bold tracking-wider text-[#A98467] uppercase bg-[#F5EBE6] px-2 py-0.5 rounded-md">${block.label}</span>
                            <h3 class="serif-title text-lg md:text-xl font-medium text-stone-800 mt-1.5 pr-4">${block.title}</h3>
                        </div>
                        <svg id="icon-${index}" class="w-5 h-5 text-stone-400 transition-transform duration-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>

                    <!-- Contenido Desplegable -->
                    <div id="content-${index}" class="hidden border-t border-stone-100 bg-stone-50/20 divide-y divide-stone-100">
                        ${block.exercises.map(ex => `
                            <div class="p-5 flex flex-col md:flex-row justify-between gap-4 bg-white/40">
                                <div class="flex gap-4 items-start md:items-center">
                                    <!-- Imagen Demostrativa -->
                                    ${ex.img ? `
                                        <img src="${ex.img}" alt="${ex.name}" class="w-20 h-20 object-cover rounded-lg border border-stone-200 shadow-2xs">
                                    ` : `
                                        <div class="w-20 h-20 bg-stone-100 rounded-lg border border-stone-200/50 flex flex-col items-center justify-center text-stone-300 text-[10px] text-center p-1 italic">
                                            <span>Sin foto</span>
                                        </div>
                                    `}
                                    <div>
                                        <h4 class="text-stone-800 text-base font-semibold">${ex.name}</h4>
                                        
                                        <!-- Sub-ejercicios planos (los de guion del Excel) -->
                                        ${ex.subItems ? `
                                            <div class="mt-2 flex flex-wrap gap-1.5">
                                                ${ex.subItems.map(sub => `
                                                    <span class="text-[11px] bg-stone-100 text-stone-600 px-2.5 py-0.5 rounded-full border border-stone-200/50">
                                                        ${sub.startsWith('-') ? sub : '- ' + sub}
                                                    </span>
                                                `).join('')}
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 self-end md:self-center">
                                    <span class="text-[10px] uppercase tracking-wider text-stone-400 font-medium">${rightSideHeader}:</span>
                                    <span class="px-3 py-1 bg-[#F5EBE6] text-[#A98467] text-xs font-semibold rounded-lg shadow-3xs">${ex.value || 'N/A'}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);

                // Auto-desplegar si hay filtros aplicados
                if(searchText) {
                    toggleDropdown(index);
                }
            });
        }

        // Cargar Mat por defecto
        document.addEventListener("DOMContentLoaded", () => {
