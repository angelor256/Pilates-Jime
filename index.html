<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilates con Jime - Rutinas & Ejercicios</title>
    <!-- Tailwind CSS para el diseño aesthetic y moderno -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts para tipografías delicadas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAF7F2; /* Fondo crema suave aesthetic */
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FAF7F2; }
        ::-webkit-scrollbar-thumb { background: #E6DFD5; border-radius: 10px; }
    </style>
</head>
<body class="text-stone-700 min-h-screen flex flex-col">

    <!-- Encabezado Principal -->
    <header class="w-full py-8 text-center bg-white/60 backdrop-blur-md sticky top-0 z-50 border-b border-stone-200/50">
        <h1 class="serif-title text-4xl font-light tracking-wide text-stone-800">Pilates con Jime</h1>
        <p class="text-xs uppercase tracking-[0.25em] text-stone-400 mt-2">Mindful Movement & Balance</p>

        <!-- Menú de Pestañas Principales -->
        <div class="flex justify-center gap-4 mt-6">
            <button id="tab-mat" onclick="switchMainTab('mat')" class="px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer border shadow-xs">
                Pilates Mat
            </button>
            <button id="tab-reformer" onclick="switchMainTab('reformer')" class="px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer border shadow-xs">
                Reformer
            </button>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-4xl w-full mx-auto px-6 py-10 flex-grow">
        
        <!-- Buscador -->
        <div class="bg-white p-6 rounded-2xl border border-stone-200/60 shadow-xs mb-8 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="relative w-full">
                <input type="text" id="search-input" oninput="handleFilter()" placeholder="Buscar un ejercicio específico por su nombre..." 
                    class="w-full pl-4 pr-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-stone-400 transition-colors">
            </div>
        </div>

        <!-- Contenedor Único de Acordeones Dinámicos -->
        <div id="exercises-container" class="space-y-4">
            <!-- Las series se generarán dinámicamente aquí -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-6 text-center text-xs text-stone-400 border-t border-stone-200/40 bg-white/30">
        <p>&copy; Pilates con Jime. Hecho con ♡.</p>
    </footer>

    <script>
        // BASE DE DATOS ESTRUCTURADA EN CATEGORÍAS/SERIES CON SOPORTE PARA IMÁGENES
        const db = {
            mat: [
                {
                    title: "Todos los Ejercicios de Pilates Mat y Repeticiones",
                    label: "Bloque Completo",
                    exercises: [
                        { name: "The Hundred", value: "100 bombeos", img: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=300&q=80" }, // Puedes cambiar esta URL de ejemplo por la tuya
                        { name: "Roll Up", value: "3-5x", img: "" },
                        { name: "Roll Over", value: "3 sets", img: "" },
                        { name: "Single Leg Circles", value: "3-5x", img: "" },
                        { name: "Rolling Like a Ball", value: "5-10x", img: "" },
                        { name: "Single Leg Stretch", value: "5-10 sets", img: "" },
                        { name: "Double Leg Stretch", value: "5-10x", img: "" },
                        { name: "Single Straight Leg Stretch", value: "5-10 sets", img: "" },
                        { name: "Double Straight Leg Stretch", value: "5-10x", img: "" },
                        { name: "Criss Cross", value: "5-10 sets", img: "" },
                        { name: "Spine Stretch Forward", value: "3-5x", img: "" },
                        { name: "Open Leg Rocker", value: "6x", img: "" },
                        { name: "Corkscrew w/Hips over", value: "3-5 sets", img: "" },
                        { name: "Saw", value: "4 sets", img: "" },
                        { name: "Neck Roll/Swan", value: "3-5x", img: "" }
                    ]
                },
                {
                    title: "Mat Clásico Básico (Principiantes)",
                    label: "Nivel Inicial",
                    exercises: [
                        { name: "Hundred", value: "Básico", img: "" },
                        { name: "Roll-up", value: "Básico", img: "" },
                        { name: "Leg Circles", value: "Básico", img: "" },
                        { name: "Rolling like ball", value: "Básico", img: "" },
                        { name: "The Fives (Isométricos)", value: "Bloque 1-5", img: "" },
                        { name: "Spine Stretch Forward", value: "Básico", img: "" },
                        { name: "CorkScrew", value: "Básico", img: "" },
                        { name: "Saw", value: "Básico", img: "" },
                        { name: "Swan", value: "Básico", img: "" },
                        { name: "Seal", value: "Básico", img: "" },
                        { name: "Push up's 1", value: "Final", img: "" }
                    ]
                },
                {
                    title: "Mat Clásico Intermedio",
                    label: "Nivel Medio",
                    exercises: [
                        { name: "Hundred & Roll-up", value: "Intermedio", img: "" },
                        { name: "Roll-over & Leg Circles", value: "Intermedio", img: "" },
                        { name: "Rolling like ball", value: "Intermedio", img: "" },
                        { name: "The Fives Completos", value: "Intermedio", img: "" },
                        { name: "Open Leg Rocker & CorckScrew", value: "Intermedio", img: "" },
                        { name: "Saw & Swan Dive", value: "Intermedio", img: "" },
                        { name: "Scissors & Bicicle", value: "Intermedio", img: "" },
                        { name: "Jack Knife & Mermaid", value: "Intermedio", img: "" },
                        { name: "Teaser 1, 2, 3", value: "Intermedio", img: "" },
                        { name: "Seal & Push up's 1, 2", value: "Final Intermedio", img: "" }
                    ]
                }
            ],
            reformer: [
                { 
                    title: "Footwork Series", 
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Toes", value: "4 Resortes", img: "" },
                        { name: "Arches", value: "4 Resortes", img: "" },
                        { name: "Heels", value: "4 Resortes", img: "" },
                        { name: "Tendon Stretch", value: "4 Resortes", img: "" },
                        { name: "Hundred", value: "4 Resortes", img: "" }
                    ]
                },
                {
                    title: "Overhead & Coordination",
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Overhead", value: "2 Resortes", img: "" },
                        { name: "Coordination", value: "2 Resortes", img: "" }
                    ]
                },
                { 
                    title: "Rowing Series", 
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Into the Sternum", value: "1 Resorte", img: "" },
                        { name: "90 Degrees", value: "1 Resorte", img: "" },
                        { name: "From the Chest", value: "1 Resorte", img: "" },
                        { name: "From the Hips", value: "1 Resorte", img: "" },
                        { name: "Shaving", value: "1 Resorte", img: "" },
                        { name: "Hug", value: "1 Resorte", img: "" }
                    ]
                },
                { 
                    title: "Long Box Series", 
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Pull Straps", value: "1 Resorte", img: "" },
                        { name: "Backstroke", value: "2 Resortes", img: "" },
                        { name: "Teaser", value: "1 Resorte", img: "" },
                        { name: "Horseback", value: "1 Resorte", img: "" }
                    ]
                },
                { 
                    title: "Short Box Series", 
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Round Back", value: "2 Resortes", img: "" },
                        { name: "Flat Back", value: "2 Resortes", img: "" },
                        { name: "Side to Side", value: "2 Resortes", img: "" },
                        { name: "Twist", value: "2 Resortes", img: "" },
                        { name: "Tree", value: "2 Resortes", img: "" }
                    ]
                },
                { 
                    title: "Long Stretch Series", 
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Long Stretch", value: "2 Resortes", img: "" },
                        { name: "Down Stretch", value: "2 Resortes", img: "" },
                        { name: "Up Stretch", value: "2 Resortes", img: "" },
                        { name: "Elephant", value: "2 Resortes", img: "" },
                        { name: "Long Back Stretch", value: "2 Resortes", img: "" }
                    ]
                },
                { 
                    title: "Stomach Massage Series", 
                    label: "Serie de Reformer",
                    exercises: [
                        { name: "Round", value: "4 Resortes", img: "" },
                        { name: "Hands Back", value: "3 Resortes", img: "" },
                        { name: "Reach Up", value: "2 Resortes", img: "" },
                        { name: "Twist", value: "2 Resortes", img: "" },
                        { name: "Tendon Stretch", value: "2 Resortes", img: "" }
                    ]
                }
            ]
        };

        let currentMainTab = 'mat';

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.getElementById('search-input').value = ''; // Limpiar buscador al cambiar
            
            const matBtn = document.getElementById('tab-mat');
            const refBtn = document.getElementById('tab-reformer');
            
            if(tab === 'mat') {
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            } else {
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            }

            handleFilter();
        }

        function toggleDropdown(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function handleFilter() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            let list = db[currentMainTab];

            // Si hay un texto de búsqueda, filtramos los bloques dinámicamente
            if (searchText) {
                list = list.map(block => {
                    const matchedExercises = block.exercises.filter(e => e.name.toLowerCase().includes(searchText));
                    if (block.title.toLowerCase().includes(searchText) || matchedExercises.length > 0) {
                        return { ...block, exercises: matchedExercises.length > 0 ? matchedExercises : block.exercises };
                    }
                    return null;
                }).filter(Boolean);
            }

            if(list.length === 0) {
                container.innerHTML = `<p class="text-center text-stone-400 text-sm py-12 italic">No encontramos ejercicios con ese nombre.</p>`;
                return;
            }

            // Generar los acordeones dinámicamente
            list.forEach((block, index) => {
                const card = document.createElement('div');
                card.className = "bg-white border border-stone-200/70 rounded-xl shadow-xs overflow-hidden transition-all duration-300";
                
                // Texto de la derecha (Repeticiones o Resortes según la pestaña)
                const rightSideLabel = currentMainTab === 'mat' ? 'Repeticiones' : 'Resortes';

                card.innerHTML = `
                    <!-- Encabezado del Acordeón -->
                    <div onclick="toggleDropdown('${index}')" class="p-5 flex justify-between items-center cursor-pointer hover:bg-stone-50/60 transition-colors">
                        <div>
                            <span class="text-[10px] font-bold tracking-wider text-[#A98467] uppercase bg-[#F5EBE6] px-2 py-0.5 rounded-md">${block.label}</span>
                            <h3 class="serif-title text-xl text-stone-800 mt-1 pr-4">${block.title}</h3>
                        </div>
                        <svg id="icon-${index}" class="w-5 h-5 text-stone-400 transition-transform duration-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>

                    <!-- Contenido Desplegable del bloque -->
                    <div id="content-${index}" class="hidden border-t border-stone-100 bg-stone-50/30 divide-y divide-stone-100">
                        ${block.exercises.map(ex => `
                            <div class="p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white/50">
                                <div class="flex flex-col md:flex-row md:items-center gap-4">
                                    <!-- Espacio para la Imagen -->
                                    ${ex.img ? `
                                        <img src="${ex.img}" alt="${ex.name}" class="w-20 h-20 object-cover rounded-lg border border-stone-200 shadow-2xs">
                                    ` : `
                                        <div class="w-20 h-20 bg-stone-100 rounded-lg border border-stone-200/60 flex items-center justify-center text-stone-300 text-[10px] text-center p-1 italic">
                                            Sin foto
                                        </div>
                                    `}
                                    <div>
                                        <h4 class="text-stone-700 text-base font-medium">${ex.name}</h4>
                                        <p class="text-[11px] text-stone-400 mt-0.5">Pilates original</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 self-end sm:self-center">
                                    <span class="text-[10px] uppercase tracking-wider text-stone-400 font-medium">${rightSideLabel}:</span>
                                    <span class="px-3 py-1 bg-[#F5EBE6] text-[#A98467] text-xs font-semibold rounded-lg">${ex.value}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);

                // Si se está realizando una búsqueda, abrir los acordeones de forma automática
                if(searchText) {
                    toggleDropdown(index);
                }
            });
        }

        // Cargar por defecto en Pilates Mat
        document.addEventListener("DOMContentLoaded", () => {
            switchMainTab('mat');
        });
    </script>
</body>
</html>
