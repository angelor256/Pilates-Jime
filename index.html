        let currentMainTab = 'mat';

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.getElementById('search-input').value = ''; // Resetear barra de búsqueda
            
            const matBtn = document.getElementById('tab-mat');
            const refBtn = document.getElementById('tab-reformer');
            
            if(tab === 'mat') {
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            } else {
                refBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-[#EAE0D5] text-stone-800 border-[#DDD0C2] shadow-xs";
                matBtn.className = "px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 cursor-pointer bg-white text-stone-400 border-stone-200 hover:text-stone-600";
            }

            handleFilter();
        }

        function toggleDropdown(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // Renderizador de una fila de ejercicio individual estándar
        function renderExerciseRow(ex, badgeLabel) {
            return `
                <div class="bg-white border border-stone-200/70 p-4 rounded-xl shadow-2xs flex flex-col md:flex-row justify-between gap-4 items-start md:items-center">
                    <div class="flex gap-4 items-start md:items-center">
                        ${ex.img ? `
                            <img src="${ex.img}" alt="${ex.name}" class="w-16 h-16 object-cover rounded-lg border border-stone-200 shadow-3xs flex-shrink-0">
                        ` : `
                            <div class="w-16 h-16 bg-stone-100 rounded-lg border border-stone-200/50 flex items-center justify-center text-stone-300 text-[10px] text-center p-1 italic flex-shrink-0">
                                <span>Sin foto</span>
                            </div>
                        `}
                        <div>
                            <h4 class="text-stone-800 text-base font-semibold">${ex.name}</h4>
                            ${ex.subItems ? `
                                <div class="mt-1.5 flex flex-wrap gap-1">
                                    ${ex.subItems.map(sub => `<span class="text-[10px] bg-stone-50 text-stone-500 px-2 py-0.5 rounded-md border border-stone-200/40">- ${sub}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 self-end md:self-center">
                        <span class="text-[10px] uppercase tracking-wider text-stone-400 font-medium">${badgeLabel}:</span>
                        <span class="px-2.5 py-1 bg-[#F5EBE6] text-[#A98467] text-xs font-semibold rounded-md">${ex.value || 'N/A'}</span>
                    </div>
                </div>
            `;
        }

        function handleFilter() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';

            const badgeLabel = currentMainTab === 'mat' ? 'Reps' : 'Resortes';
            let list = db[currentMainTab];

            list.forEach((item, index) => {
                // CASO 1: ES UN EJERCICIO PLANO / INDIVIDUAL (Fuera de los grupos)
                if (!item.isGroup) {
                    if (searchText && !item.name.toLowerCase().includes(searchText) && !(item.subItems && item.subItems.some(s => s.toLowerCase().includes(searchText)))) {
                        return; // Ocultar si no coincide con la búsqueda
                    }
                    container.innerHTML += renderExerciseRow(item, badgeLabel);
                } 
                // CASO 2: ES UN TÍTULO GRANDE / EN NEGRIQUITA DE GRUPO DESPLEGABLE
                else {
                    let exercisesToRender = item.exercises;
                    
                    // Si el usuario busca algo, filtramos los ejercicios de este acordeón
                    if (searchText) {
                        exercisesToRender = item.exercises.filter(ex => 
                            ex.name.toLowerCase().includes(searchText) || 
                            (ex.subItems && ex.subItems.some(s => s.toLowerCase().includes(searchText)))
                        );
                        if (!item.title.toLowerCase().includes(searchText) && exercisesToRender.length === 0) {
                            return; // No renderizar el acordeón completo si nada coincide
                        }
                        if (exercisesToRender.length === 0) exercisesToRender = item.exercises;
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white border border-stone-200/70 rounded-xl shadow-xs overflow-hidden transition-all duration-300";
                    
                    card.innerHTML = `
                        <!-- Botón del Bloque Desplegable -->
                        <div onclick="toggleDropdown('${index}')" class="p-5 flex justify-between items-center cursor-pointer bg-stone-50/40 hover:bg-stone-50 transition-colors">
                            <div>
                                <span class="text-[9px] font-bold tracking-wider text-[#A98467] bg-[#F5EBE6] px-2 py-0.5 rounded-sm uppercase">Categoría Especial</span>
                                <h3 class="serif-title text-lg font-semibold text-stone-800 mt-1 pr-4">${item.title}</h3>
                            </div>
                            <svg id="icon-${index}" class="w-5 h-5 text-stone-400 transition-transform duration-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>

                        <!-- Contenedor Interno Desplegable -->
                        <div id="content-${index}" class="hidden border-t border-stone-100 bg-stone-50/10 p-3 space-y-2">
                            ${exercisesToRender.map(ex => renderExerciseRow(ex, badgeLabel)).join('')}
                        </div>
                    `;
                    container.appendChild(card);

                    // Si hay una búsqueda activa, dejamos el grupo abierto automáticamente
                    if (searchText) {
                        toggleDropdown(index);
                    }
                }
            });

            if (container.children.length === 0) {
                container.innerHTML = `<p class="text-center text-stone-400 text-sm py-12 italic">No encontramos coincidencias.</p>`;
            }
        }

        // Inicializar la app en la pestaña Mat
        document.addEventListener("DOMContentLoaded", () => {
