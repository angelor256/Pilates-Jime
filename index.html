<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umera Pilates - Ejercicios</title>
    <!-- Tailwind CSS para el diseño rápido y moderno -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts para tipografía aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAF7F2; /* Fondo crema suave muy aesthetic */
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="text-stone-700 min-h-screen flex flex-col">

    <!-- Navbar / Encabezado -->
    <header class="w-full py-8 text-center border-b border-stone-200/60 bg-white/40 backdrop-blur-md sticky top-0 z-50">
        <h1 class="serif-title text-4xl font-light tracking-wide text-stone-800">Umera</h1>
        <p class="text-xs uppercase tracking-[0.2em] text-stone-400 mt-2">Pilates & Mindful Movement</p>
    </header>

    <!-- Contenido Principal -->
    <main class="max-w-5xl w-full mx-auto px-6 py-12 flex-grow">
        <div class="text-center mb-12">
            <h2 class="serif-title text-2xl italic text-stone-600">Guía de Ejercicios & Rutinas</h2>
            <p class="text-sm text-stone-400 mt-2">Selecciona una categoría para ver los ejercicios y repeticiones recomendadas.</p>
        </div>

        <!-- Contenedor de Categorías (Pestañas) -->
        <div id="categories-tabs" class="flex flex-wrap justify-center gap-3 mb-10">
            <!-- Las pestañas se generarán dinámicamente con JavaScript -->
        </div>

        <!-- Grid de Ejercicios -->
        <div id="exercises-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Las tarjetas de ejercicios se generarán aquí -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-6 text-center text-xs text-stone-400 border-t border-stone-200/40 bg-white/20">
        <p>&copy; 2026 Umera Studio. Hecho con ♡ para Jime.</p>
    </footer>

    <!-- Lógica de JavaScript -->
    <script>
        // 1. AQUÍ PEGAS LOS DATOS DE TU EXCEL
        // Puedes copiar las filas de tu Excel y transformarlas en este formato de objetos:
        const excelData = [
            { categoria: "Mat Pilates", ejercicio: "The Hundred (El Cien)", repeticiones: "100 bombeos (10 respiraciones)", tip: "Mantener el core bien conectado y la mirada hacia el ombligo." },
            { categoria: "Mat Pilates", ejercicio: "Roll Up", repeticiones: "5 a 8 repeticiones", tip: "Articula la columna vértebra por vértebra, sin impulsos." },
            { categoria: "Mat Pilates", ejercicio: "Single Leg Stretch", repeticiones: "10 a 12 por pierna", tip: "Mantén los hombros relajados y separados de las orejas." },
            
            { categoria: "Reformer", ejercicio: "Footwork (Pilates V)", repeticiones: "20 repeticiones", tip: "Presiona los talones juntos y mantén la pelvis neutra." },
            { categoria: "Reformer", ejercicio: "Leg Circles", repeticiones: "8 círculos hacia cada lado", tip: "Movimiento controlado desde la cadera, no desde el pie." },
            
            { categoria: "Estiramientos & Flexibilidad", ejercicio: "Mermaid (La Sirena)", repeticiones: "3 a 4 por lado", tip: "Siente la apertura en todo el lateral de tus costillas." },
            { categoria: "Estiramientos & Flexibilidad", ejercicio: "Cat-Cow Stretch", repeticiones: "8 ciclos completos", tip: "Sincroniza el movimiento perfectamente con tu respiración." }
        ];

        // Variables de estado
        let activeCategory = "";

        // Inicializar la página
        function init() {
            // Extraer categorías únicas del Excel
            const categories = [...new Set(excelData.map(item => item.categoria))];
            
            if (categories.length > 0) {
                activeCategory = categories[0]; // La primera categoría se activa por defecto
                renderTabs(categories);
                renderExercises();
            }
        }

        // Renderizar los botones de las categorías
        function renderTabs(categories) {
            const tabsContainer = document.getElementById("categories-tabs");
            tabsContainer.innerHTML = "";

            categories.forEach(category => {
                const button = document.createElement("button");
                button.textContent = category;
                
                // Clases base para el estilo cute/minimalista
                button.className = "px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 cursor-pointer ";
                
                // Estilo activo vs inactivo
                if (category === activeCategory) {
                    button.className += "bg-[#EAE0D5] text-stone-800 shadow-sm border border-[#DDD0C2]";
                } else {
                    button.className += "bg-white text-stone-400 hover:text-stone-600 border border-stone-200/60 hover:border-stone-300";
                }

                // Evento al hacer clic en una categoría
                button.onclick = () => {
                    activeCategory = category;
                    renderTabs(categories);
                    renderExercises();
                };

                tabsContainer.appendChild(button);
            });
        }

        // Renderizar las tarjetas de ejercicios de la categoría activa
        function renderExercises() {
            const container = document.getElementById("exercises-container");
            container.innerHTML = "";

            // Filtrar los ejercicios por la categoría seleccionada
            const filteredExercises = excelData.filter(item => item.categoria === activeCategory);

            filteredExercises.forEach(ex => {
                const card = document.createElement("div");
                // Estilo de tarjeta aesthetic: bordes suaves, fondo blanco limpio, sombras ligeras
                card.className = "bg-white p-6 rounded-2xl border border-stone-200/50 shadow-xs hover:shadow-md transition-shadow duration-300 flex flex-col justify-between";

                card.innerHTML = `
                    <div>
                        <h3 class="serif-title text-xl font-normal text-stone-800 mb-2">${ex.ejercicio}</h3>
                        <p class="text-xs text-stone-400 italic mb-4">${ex.tip || ''}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-stone-100 flex justify-between items-center">
                        <span class="text-xs uppercase tracking-wider text-stone-400 font-medium">Repeticiones</span>
                        <span class="px-3 py-1 bg-[#F5EBE6] text-[#A98467] text-xs font-semibold rounded-lg">${ex.repeticiones}</span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Arrancar la app al cargar
        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
